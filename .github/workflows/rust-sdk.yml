name: Rust SDK

on:
  push:
    paths:
      - 'rust/**'
      - 'testchain/**'
      - '!**/*.md'
  pull_request:
    paths:
      - 'rust/**'
      - 'testchain/**'
      - '!**/*.md'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: testchain/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Pre-build Rust test binary
        working-directory: rust
        run: cargo test --no-run

      - name: Build testchain
        working-directory: testchain
        run: go mod tidy && go build -o testchain .

      - name: Start testchain (auto-stop after 60s)
        working-directory: testchain
        run: ./testchain -timeout 60s &

      - name: Wait for chain to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf -X POST http://localhost:7999/api/reading \
               -H "Content-Type: application/json" \
               -d '{"tripod_name":"asset","func_name":"QueryBalance","params":"{}"}' \
               > /dev/null 2>&1 && nc -z localhost 8999 2>/dev/null; then
              echo "Chain ready (HTTP + WS)"
              break
            fi
            echo "Waiting for chain... ($i/20)"
            sleep 1
          done

      - name: Run Rust SDK tests
        working-directory: rust
        run: cargo test -- --nocapture
