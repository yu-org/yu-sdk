name: Python SDK

on:
  push:
    paths:
      - 'python/**'
      - 'testchain/**'
      - '!**/*.md'
  pull_request:
    paths:
      - 'python/**'
      - 'testchain/**'
      - '!**/*.md'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: testchain/go.sum

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install Python dependencies
        working-directory: python
        run: pip install -r requirements.txt

      - name: Build testchain
        working-directory: testchain
        run: go mod tidy && go build -o testchain .

      - name: Start testchain (auto-stop after 60s)
        working-directory: testchain
        run: ./testchain -timeout 60s &

      - name: Wait for chain to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf -X POST http://localhost:7999/api/reading \
               -H "Content-Type: application/json" \
               -d '{"tripod_name":"asset","func_name":"QueryBalance","params":"{}"}' \
               > /dev/null 2>&1; then
              echo "Chain ready"
              break
            fi
            echo "Waiting for chain... ($i/20)"
            sleep 1
          done

      - name: Run Python SDK tests
        working-directory: python
        run: pytest tests/ -v
